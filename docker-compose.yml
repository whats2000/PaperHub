name: paperhub

# Full-stack PaperHub deployment. This base file is CPU-ONLY and portable —
# `docker compose up --build` runs the whole stack on any host with Docker.
#
# To use NVIDIA GPUs (faster Marker ingestion + local embedding/rerank), layer
# the GPU override, which adds device reservations and builds the CUDA torch
# wheel:
#
#     docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build
#
# Secrets/keys (GEMINI_API_KEY, OPENAI_API_KEY, …) come from backend/.env.

services:
  # ── Backend API ───────────────────────────────────────────────────────────
  # FastAPI app on :8000. Also hosts the in-process MCP servers (/mcp,
  # /mcp-sql, /mcp-memory) — no extra processes for those.
  backend:
    build:
      context: ./backend
      args:
        # CPU torch wheel by default; the GPU override sets this to a cuXXX
        # extra to bake in the matching CUDA wheel.
        TORCH_EXTRA: ""
    image: paperhub-backend
    ports: ["8000:8000"]
    env_file:
      - ./backend/.env
    environment:
      # Runtime data (SQLite DB, papers_cache, chroma) lives on a named volume.
      - PAPERHUB_WORKSPACE=/app/workspace
      # Reach the sibling services by their compose-network names.
      - PAPERHUB_MODEL_SERVER_HOST=modelserver
      - PAPERHUB_MODEL_SERVER_PORT=8001
      - PAPERHUB_MARKER_URL=http://marker:8002
      # Docker-specific MCP registry (web → open-websearch service; no spawn).
      - PAPERHUB_MCP_CONFIG=/app/mcp_servers.toml
      # Models live in the modelserver process, not the worker.
      - PAPERHUB_INPROCESS_MODELS=0
      - PAPERHUB_DEVICE=cpu
    volumes:
      - paperhub-workspace:/app/workspace
      # Docker MCP config (service-name URLs, no daemon auto-spawn).
      - ./backend/mcp_servers.docker.toml:/app/mcp_servers.toml:ro
    depends_on:
      - modelserver
      - marker
      - open-websearch
    restart: unless-stopped

  # ── Model server ──────────────────────────────────────────────────────────
  # Same image as backend, different command: hosts the embedder + reranker on
  # :8001 so they survive backend restarts. Weights cache to a named volume.
  modelserver:
    image: paperhub-backend
    build:
      context: ./backend
      args:
        TORCH_EXTRA: ""
    command: ["paperhub-modelserver"]
    environment:
      # Bind on all interfaces so the backend container can reach it.
      - PAPERHUB_MODEL_SERVER_HOST=0.0.0.0
      - PAPERHUB_MODEL_SERVER_PORT=8001
      - PAPERHUB_DEVICE=cpu
    volumes:
      - paperhub-models:/models
    restart: unless-stopped

  # ── Marker PDF ingestion ──────────────────────────────────────────────────
  marker:
    build: ./marker_service
    image: paperhub-marker
    ports: ["8002:8002"]
    # GEMINI_API_KEY turns ON Marker's use_llm accuracy pass (better
    # tables/math/captions via Gemini). The backend's .env is the project key
    # store, so the marker container reads the key from there directly — set
    # GEMINI_API_KEY (or GOOGLE_API_KEY) in backend/.env and it's picked up on
    # `docker compose up`. Keyless (key absent/blank) runs without the LLM pass.
    # env_file values do NOT override the `environment:` block below, so the
    # batch-size caps still win; the key lives only in env_file (no empty
    # `environment` GEMINI entry to clobber it).
    env_file:
      - ./backend/.env
    environment:
      # Surya batch sizes are the dominant Marker VRAM knob. Each is read from
      # the environment by surya/settings.py; the upstream GPU DEFAULTS are huge
      # (DETECTOR=36 ~16GB, RECOGNITION=256/512 ~12-26GB, LAYOUT=32 ~7GB,
      # TABLE_REC=64 ~10GB), which OOM-crashes a dense page on a 6 GB GPU.
      # These conservative caps bound peak VRAM so a dense two-column page
      # completes instead of crashing. Override per-host via host env / .env for
      # bigger GPUs (e.g. RECOGNITION_BATCH_SIZE=64). VRAM-per-item (surya docs):
      # detector ~440MB, recognition ~40-50MB, layout ~220MB, table_rec ~150MB.
      - DETECTOR_BATCH_SIZE=${DETECTOR_BATCH_SIZE:-4}
      - RECOGNITION_BATCH_SIZE=${RECOGNITION_BATCH_SIZE:-8}
      - LAYOUT_BATCH_SIZE=${LAYOUT_BATCH_SIZE:-4}
      - TABLE_REC_BATCH_SIZE=${TABLE_REC_BATCH_SIZE:-4}
    volumes:
      # Surya/marker model weights download ONCE into this named volume on the
      # first /extract and persist across restarts AND image rebuilds, so the
      # build never re-downloads them. HF_HOME/TORCH_HOME point at /models.
      - marker-models:/models
    restart: unless-stopped

  # ── Web search MCP (open-websearch) ─────────────────────────────────────────
  # No-key multi-engine search MCP daemon on :3000. The backend's `web` MCP
  # entry points here. Bing is excluded (its cn.bing.com endpoint 301s most
  # traffic → 0 results); duckduckgo is the default.
  open-websearch:
    image: node:20-slim
    command: ["npx", "-y", "open-websearch@latest"]
    environment:
      - PORT=3000
      - MODE=http
      - ALLOWED_SEARCH_ENGINES=duckduckgo,brave,startpage
      - DEFAULT_SEARCH_ENGINE=duckduckgo
    restart: unless-stopped

  # ── Frontend (nginx-served SPA + API reverse-proxy) ─────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # Empty = relative same-origin API calls, proxied by nginx → backend.
        VITE_API_BASE_URL: ""
    image: paperhub-frontend
    ports: ["8080:80"]
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  paperhub-workspace:
  paperhub-models:
  marker-models:
