name: CI

# Quality gates on every push / PR to main — mirrors the local gates in
# CLAUDE.md (backend: pytest · ruff · mypy; frontend: vitest · typecheck ·
# lint · build). These run on Linux; the Docker release (release.yml) only
# fires on a version tag once these are green.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: every job only checks out + reads the repo. Declared at the
# top level so all jobs inherit read-only access to repo contents and nothing
# else (no write to issues, PRs, packages, etc.).
permissions:
  contents: read

# Supersede in-flight runs for the same ref (a force-push / new commit).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which top-level folder changed, so each gate runs only when its own
  # tree (or this workflow) is touched. GitHub Actions has no native per-job
  # `paths`, so we compute it once and gate the jobs below via `needs` + `if`.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  backend:
    name: Backend (pytest · ruff · mypy)
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      # Cache Hugging Face weights: a test that exercises the in-process
      # embedder/reranker (conftest sets PAPERHUB_INPROCESS_MODELS=1) downloads
      # the SentenceTransformer/CrossEncoder once — cache it across runs.
      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('backend/uv.lock') }}
          restore-keys: hf-${{ runner.os }}-

      # Optional pipeline tools (cheap): pandoc (LaTeX→HTML fallback path) and
      # poppler-utils (PDF tooling). NOT TeX Live — unit tests stub compilation.
      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pandoc poppler-utils

      - name: Sync dependencies (incl. dev group)
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check src tests

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest -q

  frontend:
    name: Frontend (vitest · typecheck · lint · build)
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
