# PaperHub frontend — serve the SPA + reverse-proxy the backend API.
#
# The SPA is built with VITE_API_BASE_URL="" so every fetch is same-origin and
# relative (e.g. POST /chat, GET /sessions/...). nginx routes the known backend
# route prefixes to the `backend` service; everything else falls through to the
# static SPA with history-API fallback. This sidesteps CORS entirely.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Generous body size for PDF uploads (POST /papers/upload). Backend caps
    # the real limit via PAPERHUB_MAX_UPLOAD_MB; keep nginx out of the way.
    client_max_body_size 64m;

    # Docker's embedded DNS. Combined with a variable in `proxy_pass` below,
    # this forces nginx to re-resolve `backend` per request instead of
    # caching the IP at startup — so recreating the backend container
    # (compose up after a rebuild) doesn't strand nginx on a dead IP (502).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $paperhub_backend "backend:8000";

    # ── Backend API prefixes ────────────────────────────────────────────────
    # /chat is Server-Sent Events: disable buffering so tokens stream through
    # immediately, and allow a long read timeout for slow agent turns.
    location /chat {
        proxy_pass http://$paperhub_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Other REST + the in-process MCP mounts. The regex covers /mcp, /mcp-sql,
    # /mcp-memory in one block.
    location ~ ^/(sessions|papers|chunks|memories|health)(/|$) {
        proxy_pass http://$paperhub_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 600s;
    }

    location ~ ^/mcp(-sql|-memory)?(/|$) {
        proxy_pass http://$paperhub_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 600s;
    }

    # ── Static module/wasm assets ───────────────────────────────────────────
    # nginx's default mime.types maps neither .mjs nor .wasm, so the bundled
    # pdf.js worker (pdf.worker.min.mjs, loaded as an ES module) is served as
    # application/octet-stream and rejected by strict MIME checking. Force the
    # correct types so module scripts + the wasm load.
    location ~* \.mjs$ {
        default_type application/javascript;
        try_files $uri =404;
    }
    location ~* \.wasm$ {
        default_type application/wasm;
        try_files $uri =404;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
