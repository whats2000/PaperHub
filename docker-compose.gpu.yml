name: paperhub

# GPU override — layer on top of the base file:
#
#     docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build
#
# Requires the NVIDIA Container Toolkit on the host (and WSL2 + the NVIDIA
# driver on Windows).
#
# The modelserver service was removed (dense-vector RAG stack removed in
# v2.27). Only Marker benefits from a GPU reservation now.
#
# Services not listed here (backend, frontend, open-websearch) are unaffected.

services:
  marker:
    # Marker's image already bundles CUDA torch (PyPI wheel); just grant it a
    # GPU. It falls back to CPU automatically if none is visible.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
