[project]
name = "paperhub"
version = "0.1.0"
description = "PaperHub — paper knowledge base & research assistant"
requires-python = ">=3.12,<3.13"
dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
  "pydantic>=2.9",
  "pydantic-settings>=2.6",
  "litellm>=1.52",
  # chromadb 1.x — Task 5 (vectors.py) uses chromadb.PersistentClient + 1.x Collection API
  "chromadb>=1.0",
  "pyyaml>=6.0",
  "httpx>=0.27",
  "langgraph>=0.2.50",
  "grobid-client-python>=0.0.9",
  "sentence-transformers>=3.3",
  "sse-starlette>=2.1",
  "tiktoken>=0.7",
  "mcp>=1.27.1",
]

[dependency-groups]
dev = [
  "pytest>=8.3",
  "pytest-asyncio>=0.24",
  "mypy>=1.13",
  "ruff>=0.7",
  "types-pyyaml>=6.0",
]

[tool.uv]
package = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.12"
strict = true
files = ["paperhub", "tests"]
plugins = ["pydantic.mypy"]
warn_unused_ignores = true

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "TID", "RUF"]
