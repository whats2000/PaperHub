# F4.5 layout examples — INSPIRATION for slide_agent, not enforced templates.
# ==========================================================================
#
# The agent reads `purpose` + `when_to_use` + `matches_aspect` to pick a
# layout that fits the figure aspect + the slide's content; it may also
# DESIGN a custom layout the library does not cover. The canvas budget yaml
# (`slide_canvas_budget.yaml`) owns the GEOMETRY numbers; this file is the
# DESIGN reference.
#
# v2.25 / F4.5: title + closer are folded into normal-frame examples — no
# separate visual family. Both use `\begin{frame}{Title}` with the regular
# theme so the deck reads as one consistent visual language.
#
# Schema:
#   examples:
#     - id: <slug>
#       purpose: <one-line summary>
#       when_to_use: <reasoning about when this layout serves the content>
#       matches_aspect: <">= X" / "<= X" / "X..Y" / "any" / "no_figure">
#       example: |
#         <hand-authored LaTeX excerpt>

version: 2

examples:
  - id: title_frame
    purpose: "Talk title page — paper title + authors + year + institute."
    when_to_use: |
      Always slide 1. Uses normal \begin{frame}{Title} + \titlepage rendered
      with the regular theme — NOT [plain] + \Large + \rule decorations.
    matches_aspect: no_figure
    example: |
      \begin{frame}{}
        \titlepage
      \end{frame}

  - id: closer_frame_takeaway
    purpose: "Concluding slide with key takeaway bullets and optional open question."
    when_to_use: |
      Last slide. Uses normal \begin{frame}{Conclusion} or {Questions?} with
      the regular theme — NOT a [plain] custom-centered layout. Consistent
      visual language with the body frames is critical.
    matches_aspect: no_figure
    example: |
      \begin{frame}{Conclusion}
        \begin{itemize}
          \item Key takeaway 1
          \item Key takeaway 2
          \item Open question for discussion
        \end{itemize}
      \end{frame}

  - id: executive_summary
    purpose: "Slide 2 — paper's contribution in 3-5 quantified bullets."
    when_to_use: |
      Right after the title. Quantified ("14% improvement on X benchmark"),
      not vague ("better performance").
    matches_aspect: no_figure
    example: |
      \begin{frame}{Contributions}
        \begin{itemize}
          \item Propose FASTer: block-parallel autoregressive decoding for VLA models.
          \item Achieve 112ms inference latency on real-robot manipulation (vs 76ms baseline at lower task success).
          \item Demonstrate 96\% success on LIBERO with 50\% visual-token pruning.
        \end{itemize}
      \end{frame}

  - id: figure_left_half_portrait_with_bullets
    purpose: "Portrait/square figure on the left, 4-5 bullets on the right."
    when_to_use: |
      Method overview figure where the figure shape is portrait or
      near-square (aspect 0.5-1.3). Bullets explain what the reader is
      looking at.
    matches_aspect: "0.5..1.3"
    example: |
      \begin{frame}{Method Overview}
        \begin{columns}[T]
          \begin{column}{0.5\textwidth}
            \includegraphics[width=\linewidth,height=0.7\textheight,keepaspectratio]{p0-fig-001}
          \end{column}
          \begin{column}{0.5\textwidth}
            \begin{itemize}\setlength\itemsep{0.3em}
              \item Visual tokens scored by text-attention.
              \item Low-importance tokens pruned early.
              \item Action expert decodes block-parallel.
              \item Achieves 112ms latency.
            \end{itemize}
          \end{column}
        \end{columns}
      \end{frame}

  - id: figure_top_full_landscape_with_caption
    purpose: "Landscape figure spanning the full width on top, 1-2 short bullets below."
    when_to_use: |
      Architecture diagrams, scatter plots, or any figure with aspect
      >= 1.5. Caption + minimal bullets — wide-short text band can't hold
      much.
    matches_aspect: ">= 1.5"
    example: |
      \begin{frame}{Architecture}
        \includegraphics[width=\linewidth,height=0.6\textheight,keepaspectratio]{p0-fig-002}
        \vspace{0.3em}
        {\small Trajectory-aware pruning toggles based on end-effector velocity windows.}
      \end{frame}

  - id: equation_centered_with_notation
    purpose: "Display equation centered, notation legend below."
    when_to_use: |
      Method-explanation slides where the math IS the contribution.
      Required by contract #2 whenever the frame topic matches a
      key_equation's role.
    matches_aspect: no_figure
    example: |
      \begin{frame}{Visual Token Importance Scoring}
        \[
          \Phi^{(l)}(v) = \frac{1}{N^h \cdot L_{\text{txt}}}
          \sum_{h=1}^{N^h} \sum_{t=1}^{L_{\text{txt}}} \mathbf{A}^{(l)}_{h,t,v}
        \]
        {\small
        \begin{itemize}\setlength\itemsep{0.2em}
          \item $\Phi^{(l)}(v)$: importance score for visual token $v$ at layer $l$
          \item $\mathbf{A}^{(l)}$: text-to-vision attention matrix
          \item $N^h$: attention heads; $L_{\text{txt}}$: text sequence length
        \end{itemize}
        }
      \end{frame}

  - id: comparison_table
    purpose: "Quantitative comparison vs baselines."
    when_to_use: |
      Results slides with 3-6 rows x 3-5 columns. Always include a 1-line
      takeaway sentence below.
    matches_aspect: no_figure
    example: |
      \begin{frame}{Real-Robot Results}
        \centering
        \begin{tabular}{lcc}
          \toprule
          Method & Success Rate & Latency \\
          \midrule
          OpenVLA-OFT & 85.8\% & 76.9ms \\
          \textbf{ADP (Ours)} & \textbf{88.3\%} & \textbf{51.8ms} \\
          \bottomrule
        \end{tabular}
        \vspace{0.5em}
        {\small +2.5pp success at 33\% lower latency on Jaco2 arm.}
      \end{frame}

  - id: text_only_motivation
    purpose: "Pure prose / bullet slide with no figure — motivation, related work, limitations."
    when_to_use: |
      When the topic is conceptual and no figure adds value. Keep to <=6
      bullets <=14 words each.
    matches_aspect: no_figure
    example: |
      \begin{frame}{Why Vision-Language-Action Models Are Slow}
        \begin{itemize}\setlength\itemsep{0.4em}
          \item Autoregressive action decoding: one token at a time.
          \item Visual tokens dominate compute (300+ patches per image).
          \item Closed-loop control demands sub-100ms latency.
          \item Existing models hit 300-500ms — unusable for real robots.
        \end{itemize}
      \end{frame}

  - id: split_overfull_into_two
    purpose: "Worked example of how to split one overfull frame into two."
    when_to_use: |
      When the overflow detector recommends split_frame. Move the figure
      to its own frame OR halve the bullets across two frames.
    matches_aspect: any
    example: |
      % BEFORE — overfull:
      % \begin{frame}{X}\includegraphics{big-fig} + 8 long bullets...\end{frame}
      % AFTER — split:
      \begin{frame}{Method Overview (Architecture)}
        \includegraphics[width=\linewidth,height=0.75\textheight,keepaspectratio]{p0-fig-001}
      \end{frame}
      \begin{frame}{Method Overview (Components)}
        \begin{itemize}\setlength\itemsep{0.3em}
          \item Component A: ...
          \item Component B: ...
          \item Component C: ...
        \end{itemize}
      \end{frame}
