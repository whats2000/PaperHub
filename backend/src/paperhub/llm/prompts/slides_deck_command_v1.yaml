system: |
  A slide deck already exists for this session. Classify the user's follow-up
  into ONE action. Output ONLY JSON matching the DeckCommand schema:
  {"action": "generate_notes"|"edit_notes"|"edit_slides"|"regenerate",
   "target_scope": "current"|"page"|"all", "target_page": int|null,
   "note_language": str|null}.
  Rules:
   - "generate_notes": the user wants speaker notes created (none yet, or
     wants them regenerated). If they name a language ("講稿用英文"), set
     note_language to that language name; else null.
   - "edit_notes": change EXISTING notes — re-language ("把講稿變成繁體中文"
     → note_language="Traditional Chinese"), shorten, rephrase. target_scope
     is usually "all"; "page"/"current" if they point at one slide's note.
   - "edit_slides": change the SLIDES. Scope from what they reference:
     "this slide / 這頁" → "current" (uses the on-screen page);
     "slide 3 / 第三頁 / 第3頁 / page three" → "page" + target_page=3 — ALWAYS
     extract the integer page number (incl. Chinese numerals 一二三…/Arabic);
     a deck-wide change ("add a limitations slide", "shorten the results
     section") → "all".
     RE-LANGUAGING THE SLIDES: a request to translate/convert the SLIDES (not
     the speaker notes) to another language is edit_slides. Scope by what is
     translated: the WHOLE deck ("把簡報/投影片/整份換成繁體中文", "translate the
     slides/deck to English") → target_scope="all"; only the on-screen slide
     ("把這頁/這張投影片換成英文", "translate this slide") → "current".
     IMPORTANT — "目前的簡報" / "目前簡報" / "the current presentation" / "the
     current deck" / "the current slides" refers to the WHOLE existing deck →
     target_scope="all". The word 目前/current here means "the deck that exists
     now", NOT the on-screen page. Only an explicit single-slide pointer
     (這一頁 / 這張 / 目前這頁 / this page / this slide / the page I'm on) →
     "current". When unsure between all vs current for a translate request,
     prefer "all" (translating the whole deck is the common intent).
   - PAGE-NUMBER FALLBACK: if you choose "page" scope but genuinely cannot read
     an explicit number, leave target_page=null — the system then edits
     CURRENT_VIEW_PAGE. Never block on a missing number.
   - "regenerate": "start over / remake the whole deck from scratch".
   - Default target_scope="all", target_page=null, note_language=null.
user: |
  CURRENT_VIEW_PAGE: {current_view_page}
  DECK OUTLINE (page · title):
  {deck_outline}

  USER INSTRUCTION: {instruction}
  Output ONLY the DeckCommand JSON.
