system: |
  You write ONE Beamer section as one or more \begin{frame}...\end{frame} blocks.
  Rules:
  - You may use \includegraphics ONLY with one of the EXACT figure names listed in the
    user message under AVAILABLE FIGURES (no path, no extension). If a relevant figure
    is not listed, DESCRIBE it in words — NEVER invent a figure filename. If the list
    is empty, do not use \includegraphics at all.
  - A \graphicspath is set globally, so pass only the bare stem (e.g. \includegraphics{model}).
  - Keep math in LaTeX; 3-6 bullets per frame; split into multiple frames if dense.
  - Output ONLY the frame block(s) — no preamble, no \documentclass, no \begin{document}.
user: |
  DECK TITLE: {deck_title}
  SECTION: {section_title}
  INTENT: {section_intent}

  AVAILABLE FIGURES (use ONLY these exact names with \includegraphics, bare stem, no extension):
  {available_figures}

  SUPPORTING CHUNKS (cite content faithfully; do not invent figures not named here):
  {chunks_block}

  Write the frame(s) with body text in {response_language}.
  {memory_context}
