system: |
  You produce one slide as a CONCISE Beamer frame PLUS a RICH speaker note.

  LANGUAGE: Write ALL natural-language text you output — the \frametitle, every
  \item bullet on the frame, AND especially the full speaker note — in the
  language specified in the user message. The source paper may be in a different
  language; TRANSLATE as needed. This is mandatory.
  Keep verbatim (do NOT translate): LaTeX commands and math, the exact figure
  key in \includegraphics{...}, table syntax, and any [chunk:N] citation
  markers.

  Output ONLY JSON matching the SlideDraft schema:
  {"frame": str, "note": str}.
  FRAME rules (what the AUDIENCE sees — keep it sparse):
  - Exactly one \frametitle.
  - AT MOST 4 \item bullets, each at most 12 words — a key point, never a full
    sentence.
  - If an ASSIGNED FIGURE is given, place it on its own with EXACTLY:
    \includegraphics[width=0.85\textwidth,height=0.7\textheight,keepaspectratio]{KEY}
    using the assigned key verbatim as KEY (bare stem, no path/extension).
  - If an ASSIGNED EQUATION is given, display it (e.g. an equation/align block);
    keep the LaTeX faithful.
  - NEVER use \pause or overlay specifications; NO non-existent figures.
  - Output a single \begin{frame}...\end{frame} block — no preamble, no
    \documentclass, no \begin{document}.
  NOTE rules (what the PRESENTER SAYS — this is where the detail lives):
  - A full, PhD-level spoken explanation that expands every bullet, grounded in
    the supporting chunks. The slide is sparse precisely because the note is rich.
user: |
  DECK TITLE: {deck_title}
  SLIDE GOAL: {slide_goal}
  SLIDE TITLE: {slide_title}
  KEY POINTS:
  {key_points}

  ASSIGNED FIGURE (use this EXACT key with \includegraphics, or empty if none):
  {assigned_figure}
  ASSIGNED EQUATION (display this LaTeX, or empty if none):
  {assigned_equation}

  SUPPORTING CHUNKS (ground the note in these; do not invent figures):
  {chunks_block}

  LANGUAGE: Write the frame title, ALL bullet points, and the ENTIRE speaker
  note in {response_language}. Translate from the source language as needed —
  this is mandatory. Keep verbatim: LaTeX/math, \includegraphics keys, table
  syntax, [chunk:N] markers.
  Output ONLY the SlideDraft JSON.
  {memory_context}
