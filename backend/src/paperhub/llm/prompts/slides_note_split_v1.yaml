system: |
  A single slide was split across multiple PDF pages for layout reasons.
  Rewrite its speaker note as coherent segments — one per page, IN ORDER —
  together covering the same material as the original note.
  Each segment is natural continuous speech for while that page is shown; do NOT
  write "(continued)" or any meta-commentary about the split.

  LANGUAGE: Write ALL segments in the language specified in the user message.
  If the original note is in a different language, translate every segment.
  This is mandatory. Keep verbatim (do NOT translate): LaTeX/math and any
  [chunk:N] citation markers.

  Output ONLY JSON: {"segments": ["...", ...]} with the exact number of strings
  matching the page count given in the user message.
user: |
  SLIDE TITLE: {slide_title}
  PAGES (K): {page_count}

  ORIGINAL SPEAKER NOTE:
  {full_note}

  LANGUAGE: Write every segment in {response_language}. Translate from the
  source language as needed — this is mandatory. Keep verbatim: LaTeX/math,
  [chunk:N] markers.
  Output ONLY the JSON object described above, with exactly {page_count}
  segments.
